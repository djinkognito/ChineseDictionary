<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinese Dictionary</title>

<style>

/* =========================================================
   GLOBAL PAGE STYLES
   Controls the overall layout, font, spacing, and background.
   ========================================================= */
body {
    font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    max-width: 900px;
    margin: 0 auto;
    padding: 30px 20px;
    background-color: #0b0826;
}

/* Main page title */
h1 {
    color: white;
    text-align: center;
    margin-bottom: 25px;
    font-size: 48px;
}

/* Top navigation buttons: Dictionary, Browse Topics, Flashcards */
.mode-buttons {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-bottom: 40px;
}

.mode-buttons button,
.flashcard-controls button,
.srs-buttons button,
.ai-buttons button {
    padding: clamp(8px, 1.5vw, 12px) clamp(12px, 2vw, 22px);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: white;
    font-size: clamp(14px, 1.8vw, 16px);
}

/* Dictionary search box and topic filter container */
.search-container {
    max-width: 650px;
    margin: 0 auto 25px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

#searchInput {
    width: 100%;
    padding: 14px;
    font-size: 18px;
    border: 2px solid #ddd;
    border-radius: 6px;
    box-sizing: border-box;
}

#searchInput:focus {
    outline: none;
    border-color: #0b0826;
}

/* Individual dictionary result card */
.result-item {
    background: white;
    border: 1px solid #ddd;
    margin: 12px 0;
    padding: 20px;
    border-radius: 10px;
}

.hanzi {
    font-size: 30px;
    margin-bottom: 8px;
    color: #333;
}

.pinyin {
    color: #666;
    margin-bottom: 8px;
    font-size: 18px;
}

.english {
    margin-bottom: 12px;
    font-size: 16px;
    color: #444;
}

.example {
    color: #666;
    font-style: italic;
    border-left: 3px solid #4CAF50;
    padding-left: 10px;
    margin-top: 10px;
    white-space: pre-wrap;
}

.no-results {
    text-align: center;
    color: white;
    padding: 20px;
}

/* =========================================================
   FLASHCARD LAYOUT
   Controls flashcard navigation, card size, and review buttons.
   ========================================================= */
.flashcard-wrapper {
    max-width: 760px;
    margin: 0 auto;
}

.flashcard-controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 18px;
}

.flashcard-status {
    color: white;
    text-align: center;
    margin-bottom: 15px;
    font-size: 15px;
}

.flashcard {
    background: white;
    border-radius: 12px;
    min-height: 340px;
    padding: 35px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    cursor: pointer;
    user-select: none;
    margin-bottom: 20px;
}

.card-front,
.card-back-hanzi {
    font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    font-weight: 700;
    color: #000;
    line-height: 1.1;
    letter-spacing: 2px;
}

.hanzi-size-1 {
    font-size: clamp(72px, 12vw, 100px);
}

.hanzi-size-2 {
    font-size: clamp(64px, 10vw, 90px);
}

.hanzi-size-3 {
    font-size: clamp(56px, 8vw, 78px);
}

.hanzi-size-4 {
    font-size: clamp(48px, 7vw, 68px);
}

.hanzi-size-long {
    font-size: clamp(34px, 6vw, 56px);
}

.card-back {
    display: none;
}

.card-back-hanzi {
    margin-bottom: 12px;
}

.card-back-pinyin {
    font-size: clamp(18px, 3vw, 28px);
    color: #666;
    margin-bottom: 14px;
    font-weight: 600;
}

.card-back-english {
    font-size: clamp(20px, 3.5vw, 32px);
    color: #333;
    line-height: 1.4;
    margin-bottom: 14px;
    font-weight: 600;
    white-space: pre-wrap;
}

.card-back-example {
    font-size: 18px;
    color: #666;
    line-height: 1.6;
    white-space: pre-wrap;
}

/* AI-generated example sentence panel shown on the back of a card */
.ai-sentence-box {
    margin-top: 18px;
    padding: 14px;
    border-radius: 10px;
    background: #f4f4f4;
    text-align: left;
    display: none;
}

.ai-sentence-title {
    font-weight: 700;
    color: #333;
    margin-bottom: 8px;
}

.ai-chinese {
    font-size: 22px;
    color: #111;
    margin-bottom: 6px;
}

.ai-pinyin {
    font-size: 16px;
    color: #666;
    margin-bottom: 6px;
}

.ai-english {
    font-size: 16px;
    color: #333;
    margin-bottom: 6px;
}

.ai-note {
    font-size: 14px;
    color: #555;
    font-style: italic;
}

.ai-buttons {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 12px;
}

/* Spaced-repetition answer buttons: Again, Good, Easy, etc. */
.srs-buttons {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 12px;
}

.primary-buttons {
    margin-bottom: 8px;
}

.primary-buttons button:hover {
    transform: translateY(-1px);
    transition: 0.15s ease;
}

.again-btn {
    background-color: #ff4d4f !important;
    color: white;
    font-weight: 600;
}

.good-btn {
    background-color: #52c41a !important;
    color: white;
    font-weight: 600;
}

.easy-btn {
    background-color: #1677ff !important;
    color: white;
    font-weight: 600;
}

.secondary-buttons {
    opacity: 0.95;
}

.secondary-buttons button,
.secondary-controls button {
    font-size: 14px;
    padding: 9px 14px;
}

.secondary-buttons button:nth-child(2) {
    background-color: #ffe5e5;
}

.secondary-controls {
    margin-top: 10px;
}


/* =========================================================
   TOPIC FILTERING AND BROWSE TOPICS
   Controls topic dropdowns, badges, tiles, and topic detail view.
   ========================================================= */
.category-filter-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    align-items: center;
}

.category-filter-row label {
    font-weight: 600;
    color: #333;
    white-space: nowrap;
}

#categoryFilter,
#flashcardCategoryFilter {
    width: 100%;
    padding: 11px;
    font-size: 16px;
    border: 2px solid #ddd;
    border-radius: 6px;
    background: white;
}

.category-badge {
    display: inline-block;
    margin-top: 4px;
    padding: 4px 9px;
    border-radius: 999px;
    background: #eee;
    color: #444;
    font-size: 13px;
    font-weight: 600;
}

.browse-wrapper {
    max-width: 760px;
    margin: 0 auto;
}

.browse-heading {
    color: white;
    text-align: center;
    margin: 0 0 18px;
    font-size: 24px;
}

.category-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 14px;
}

.category-card {
    background: white;
    border-radius: 12px;
    padding: 20px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s ease, border-color 0.15s ease;
}

.category-card:hover {
    transform: translateY(-2px);
    border-color: #aaa;
}

.category-card-name {
    font-size: 21px;
    font-weight: 700;
    color: #222;
    margin-bottom: 6px;
}

.category-card-count {
    color: #666;
    font-size: 15px;
}

.topic-detail {
    display: none;
}

.topic-detail-header {
    background: white;
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 14px;
}

.topic-detail-title {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 5px;
}

.topic-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 14px;
}

.topic-actions button,
.back-to-topics-btn {
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
}

.topic-word-list .result-item {
    margin: 10px 0;
}

.flashcard-category-row {
    max-width: 420px;
    margin: 0 auto 14px;
    color: white;
}

.flashcard-category-row label {
    display: block;
    margin-bottom: 6px;
    text-align: center;
    font-weight: 600;
}

/* =========================================================
   MOBILE RESPONSIVE STYLES
   Adjusts spacing and layout for phones and narrow screens.
   ========================================================= */
@media (max-width: 600px) {
    body {
        padding: 14px 10px;
    }

    h1 {
        font-size: 34px;
        margin-bottom: 14px;
    }

    .mode-buttons {
        flex-direction: row;
        justify-content: center;
        align-items: center;
        gap: 10px;
        margin-bottom: 22px;
    }

    .mode-buttons button {
        width: auto;
        min-width: 110px;
    }

    .flashcard-controls {
        gap: 8px;
        margin-bottom: 12px;
    }

    .flashcard-status {
        font-size: 14px;
        line-height: 1.4;
        margin-bottom: 12px;
    }

    .flashcard {
        min-height: 240px;
        padding: 22px 14px;
        margin-bottom: 14px;
    }

    .srs-buttons,
    .ai-buttons {
        gap: 8px;
        margin-top: 10px;
    }

    .primary-buttons {
        flex-direction: row;
    }

    .secondary-buttons {
        flex-direction: column;
        align-items: center;
    }

    .secondary-controls {
        margin-top: 12px;
    }

    .search-container {
        padding: 14px;
    }

    .category-filter-row {
        flex-direction: column;
        align-items: stretch;
    }

    .category-grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<!-- =======================================================
     APP HEADER
     ======================================================= -->
<h1>Chinese Dictionary</h1>

<!-- Main app navigation -->
<div class="mode-buttons">
    <button id="dictionaryModeBtn">Dictionary</button>
    <button id="browseModeBtn">Browse Topics</button>
    <button id="flashcardModeBtn">Flashcards</button>
</div>

<!-- =====================================================
     DICTIONARY MODE
     Search vocabulary and filter results by parent topic.
     ===================================================== -->
<div id="dictionarySection">
    <div class="search-container">
        <input id="searchInput"
               placeholder="Type to search (Hanzi, Pinyin, or English)..."
               autocomplete="off">

        <div class="category-filter-row">
            <label for="categoryFilter">Topic</label>
            <select id="categoryFilter">
                <option value="">All Topics</option>
            </select>
        </div>
    </div>

    <div id="results">
        <div class="no-results">Loading dictionary...</div>
    </div>
</div>

<!-- =====================================================
     BROWSE TOPICS MODE
     Displays topic tiles and the words inside each topic.
     ===================================================== -->
<div id="browseSection" style="display:none;">
    <div class="browse-wrapper">
        <div id="categoryBrowseView">
            <h2 class="browse-heading">Browse Topics</h2>
            <div id="categoryGrid" class="category-grid"></div>
        </div>

        <div id="topicDetailView" class="topic-detail">
            <button class="back-to-topics-btn" onclick="showCategoryGrid()">← All Topics</button>
            <div class="topic-detail-header">
                <div id="topicDetailTitle" class="topic-detail-title"></div>
                <div id="topicDetailCount"></div>
                <div class="topic-actions">
                    <button onclick="filterDictionaryToCurrentTopic()">Search This Topic</button>
                    <button onclick="studyCurrentTopic()">Study This Topic</button>
                </div>
            </div>
            <div id="topicWordList" class="topic-word-list"></div>
        </div>
    </div>
</div>

<!-- =====================================================
     FLASHCARD MODE
     Runs category-based SRS review sessions.
     ===================================================== -->
<div id="flashcardSection" style="display:none;">
    <div class="flashcard-wrapper">

        <div class="flashcard-category-row">
            <label for="flashcardCategoryFilter">Study Topic</label>
            <select id="flashcardCategoryFilter">
                <option value="">All Topics</option>
            </select>
        </div>

        <div class="flashcard-controls">
            <button onclick="prevCard()">Previous</button>
            <button onclick="nextCard()">Next</button>
        </div>

        <div class="flashcard-status" id="status"></div>

        <div class="flashcard" onclick="flipCard()">
            <div id="front" class="card-front">Loading...</div>

            <div id="back" class="card-back">
                <div id="backHanzi" class="card-back-hanzi"></div>
                <div id="backPinyin" class="card-back-pinyin"></div>
                <div id="backEnglish" class="card-back-english"></div>
                <div id="backExample" class="card-back-example"></div>

                <div id="aiSentenceBox" class="ai-sentence-box">
                    <div class="ai-sentence-title">AI Example Sentence</div>
                    <div id="aiChinese" class="ai-chinese"></div>
                    <div id="aiPinyin" class="ai-pinyin"></div>
                    <div id="aiEnglish" class="ai-english"></div>
                    <div id="aiNote" class="ai-note"></div>
                </div>

                <div id="aiButtons" class="ai-buttons">
                    <button onclick="generateAISentence(false); event.stopPropagation();">Generate AI Sentence</button>
                    <button onclick="generateAISentence(true); event.stopPropagation();">Generate New Sentence</button>
                </div>
            </div>
        </div>

        <div id="srsButtons" style="display:none;">
            <div class="srs-buttons primary-buttons">
                <button class="again-btn" onclick="rate('again')">Again</button>
                <button class="good-btn" onclick="rate('good')">Good</button>
                <button class="easy-btn" onclick="rate('easy')">Easy</button>
            </div>

            <div class="srs-buttons secondary-buttons">
                <button onclick="bury()">Bury Today</button>
                <button onclick="suspend()">Never Show Again</button>
            </div>
        </div>

        <div id="unsuspendButtons" class="srs-buttons" style="display:none;">
            <button onclick="unsuspend()">Unsuspend This Card</button>
            <button onclick="nextCard()">Skip</button>
        </div>

        <div class="flashcard-controls secondary-controls">
            <button onclick="enterUnsuspendMode()">Unsuspend Cards</button>
            <button onclick="resetSRS()">Reset SRS Progress</button>
        </div>

    </div>
</div>

<script>

/* =========================================================
   APP CONFIGURATION
   External data source, AI endpoint, and daily card limits.
   ========================================================= */
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTa_ES9bk_ye4K094l7cTTTrI13UiqAqvS5wCjW1XRNXaOLBYx3zrYqBP6Cv49KLOTBxo_WumZ232he/pub?output=csv";

const AI_SENTENCE_API = "https://chinese-sentence-api.vercel.app/api/generate-sentence";

const NEW_LIMIT = 20;
const REVIEW_LIMIT = 50;

/* =========================================================
   APP STATE
   Stores dictionary entries, flashcard sessions, SRS data,
   selected topics, and the currently displayed card.
   ========================================================= */
let dictionary = [];
let allCards = [];
let sessionCards = [];
let index = 0;
let shown = false;
let mode = "review";
let srs = JSON.parse(localStorage.getItem("srs") || "{}");
let aiSentences = JSON.parse(localStorage.getItem("aiSentences") || "{}");
let currentTopic = "";
let studyCategory = "";

/* =========================================================
   INITIAL APP LOAD
   Downloads the Google Sheet, builds cards, populates topic
   controls, and prepares the first flashcard session.
   ========================================================= */
async function load() {
    const res = await fetch(SHEET_URL);
    const text = await res.text();

    dictionary = parseCSV(text);

    allCards = dictionary.map((d, i) => ({
        id: i + "",
        hanzi: d.hanzi,
        pinyin: d.pinyin,
        english: d.english,
        example: d.example || "",
        category: d.category || "Uncategorized",
        topic: getParentTopic(d.category)
    }));

    populateCategoryControls();
    renderCategoryGrid();
    buildSession();
    show(0);

    document.getElementById("results").innerHTML =
        '<div class="no-results">Start typing to search.</div>';
}

/* =========================================================
   CSV PARSER
   Converts the published Google Sheet CSV into JavaScript
   objects. Supports quoted commas and header-based columns.
   ========================================================= */
function parseCSV(csv) {
    const rows = [];
    let row = [];
    let value = "";
    let insideQuotes = false;

    for (let i = 0; i < csv.length; i++) {
        const char = csv[i];
        const next = csv[i + 1];

        if (char === '"' && insideQuotes && next === '"') {
            value += '"';
            i++;
        } else if (char === '"') {
            insideQuotes = !insideQuotes;
        } else if (char === ',' && !insideQuotes) {
            row.push(value.trim());
            value = "";
        } else if ((char === '\n' || char === '\r') && !insideQuotes) {
            if (char === '\r' && next === '\n') i++;
            row.push(value.trim());
            value = "";
            if (row.some(cell => cell !== "")) rows.push(row);
            row = [];
        } else {
            value += char;
        }
    }

    if (value || row.length) {
        row.push(value.trim());
        if (row.some(cell => cell !== "")) rows.push(row);
    }

    if (!rows.length) return [];

    const headers = rows[0].map(h => h.trim().toLowerCase());
    const findColumn = (...names) => {
        for (const name of names) {
            const index = headers.indexOf(name);
            if (index !== -1) return index;
        }
        return -1;
    };

    const hanziIndex = findColumn("hanzi", "chinese", "word");
    const pinyinIndex = findColumn("pinyin");
    const englishIndex = findColumn("english", "definition", "meaning");
    const exampleIndex = findColumn("example", "example sentence");
    const categoryIndex = findColumn("category", "topic");

    return rows.slice(1).map(values => ({
        hanzi: hanziIndex >= 0 ? values[hanziIndex] || "" : values[0] || "",
        pinyin: pinyinIndex >= 0 ? values[pinyinIndex] || "" : values[1] || "",
        english: englishIndex >= 0 ? values[englishIndex] || "" : values[2] || "",
        example: exampleIndex >= 0 ? values[exampleIndex] || "" : values[3] || "",
        category: categoryIndex >= 0 ? values[categoryIndex] || "Uncategorized" : values[4] || "Uncategorized"
    })).filter(entry => entry.hanzi || entry.pinyin || entry.english);
}

/* =========================================================
   DICTIONARY SEARCH
   Searches Hanzi, Pinyin, and English while respecting the
   currently selected parent topic.
   ========================================================= */
function search(query) {
    query = query.toLowerCase().trim();
    const selectedCategory = document.getElementById("categoryFilter").value;

    return dictionary.filter(entry => {
        const matchesCategory = !selectedCategory ||
            getParentTopic(entry.category) === selectedCategory;
        const matchesQuery = !query ||
            entry.hanzi.includes(query) ||
            entry.pinyin.toLowerCase().includes(query) ||
            entry.english.toLowerCase().includes(query);

        return matchesCategory && matchesQuery;
    });
}

/* Renders matching dictionary entries on the page */
function displayResults(results) {
    const resultsDiv = document.getElementById("results");
    const currentQuery = document.getElementById("searchInput").value.trim();

    const selectedCategory = document.getElementById("categoryFilter").value;

    if (!currentQuery && !selectedCategory) {
        resultsDiv.innerHTML = '<div class="no-results">Start typing to search or select a topic.</div>';
        return;
    }

    if (results.length === 0) {
        resultsDiv.innerHTML = '<div class="no-results">No matches found.</div>';
        return;
    }

    resultsDiv.innerHTML = results.map(entry => `
        <div class="result-item">
            <div class="hanzi">${entry.hanzi}</div>
            <div class="pinyin">${entry.pinyin}</div>
            <div class="english">${entry.english}</div>
            <div class="category-badge">${escapeHTML(getParentTopic(entry.category))}</div>
            ${entry.example ? `<div class="example">${entry.example}</div>` : ""}
        </div>
    `).join("");
}

/* Prevents sheet content from being interpreted as HTML */
function escapeHTML(value) {
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

/* Returns only the text before the first slash.
   Example: "Food / Fruit" becomes "Food". */
function getParentTopic(category) {
    const value = String(category || "Uncategorized").trim();
    const parent = value.split("/")[0].trim();
    return parent || "Uncategorized";
}

/* Builds the unique list of parent topics used by dropdowns */
function getCategories() {
    return [...new Set(dictionary.map(entry => getParentTopic(entry.category)))]
        .sort((a, b) => a.localeCompare(b));
}

/* Adds parent-topic options to Dictionary and Flashcard dropdowns */
function populateCategoryControls() {
    const categories = getCategories();
    const options = categories.map(category =>
        `<option value="${escapeHTML(category)}">${escapeHTML(category)}</option>`
    ).join("");

    document.getElementById("categoryFilter").innerHTML =
        '<option value="">All Topics</option>' + options;

    document.getElementById("flashcardCategoryFilter").innerHTML =
        '<option value="">All Topics</option>' + options;
}

/* Builds the Browse Topics tiles and combines subcategory counts */
function renderCategoryGrid() {
    const counts = dictionary.reduce((map, entry) => {
        const topic = getParentTopic(entry.category);
        map[topic] = (map[topic] || 0) + 1;
        return map;
    }, {});

    const topics = Object.keys(counts).sort((a, b) => a.localeCompare(b));
    document.getElementById("categoryGrid").innerHTML = topics.map(topic => `
        <div class="category-card" onclick='openTopic(decodeURIComponent("${encodeURIComponent(topic).replaceAll("'", "%27")}"))'>
            <div class="category-card-name">${escapeHTML(topic)}</div>
            <div class="category-card-count">${counts[topic]} ${counts[topic] === 1 ? "word" : "words"}</div>
        </div>
    `).join("");
}

/* Opens one topic and displays every word grouped under it */
function openTopic(category) {
    currentTopic = category;
    const words = dictionary.filter(entry => getParentTopic(entry.category) === category);

    document.getElementById("categoryBrowseView").style.display = "none";
    document.getElementById("topicDetailView").style.display = "block";
    document.getElementById("topicDetailTitle").innerText = category;
    document.getElementById("topicDetailCount").innerText =
        `${words.length} ${words.length === 1 ? "word" : "words"}`;

    document.getElementById("topicWordList").innerHTML = words.map(entry => `
        <div class="result-item">
            <div class="hanzi">${escapeHTML(entry.hanzi)}</div>
            <div class="pinyin">${escapeHTML(entry.pinyin)}</div>
            <div class="english">${escapeHTML(entry.english)}</div>
            ${entry.example ? `<div class="example">${escapeHTML(entry.example)}</div>` : ""}
        </div>
    `).join("");
}

/* Returns from a topic detail page to the topic tile grid */
function showCategoryGrid() {
    currentTopic = "";
    document.getElementById("categoryBrowseView").style.display = "block";
    document.getElementById("topicDetailView").style.display = "none";
}

/* Opens Dictionary mode with the current Browse topic selected */
function filterDictionaryToCurrentTopic() {
    if (!currentTopic) return;
    showSection("dictionary");
    document.getElementById("categoryFilter").value = currentTopic;
    displayResults(search(document.getElementById("searchInput").value));
}

/* Opens Flashcard mode and starts a session for this topic */
function studyCurrentTopic() {
    if (!currentTopic) return;
    studyCategory = currentTopic;
    document.getElementById("flashcardCategoryFilter").value = currentTopic;
    showSection("flashcards");
    buildSession();
    show(0);
}

/* Shows one main app section and hides the other two */
function showSection(section) {
    document.getElementById("dictionarySection").style.display = section === "dictionary" ? "block" : "none";
    document.getElementById("browseSection").style.display = section === "browse" ? "block" : "none";
    document.getElementById("flashcardSection").style.display = section === "flashcards" ? "block" : "none";
}

/* Returns today's date as YYYY-MM-DD for SRS scheduling */
function today() {
    return new Date().toISOString().split("T")[0];
}

/* =========================================================
   SRS SESSION BUILDER
   Selects due cards and new cards, optionally limited to the
   chosen parent topic.
   ========================================================= */
function buildSession() {
    mode = "review";
    let t = today();

    const eligibleCards = studyCategory
        ? allCards.filter(c => c.topic === studyCategory)
        : allCards;

    let review = eligibleCards.filter(c => {
        let d = srs[c.id];
        return d &&
               !d.suspended &&
               (!d.buried || d.buried < t) &&
               d.due &&
               d.due <= t;
    });

    let newCards = eligibleCards.filter(c => {
        let d = srs[c.id];
        return (!d || !d.due) &&
               (!d || !d.suspended) &&
               (!d || !d.buried || d.buried < t);
    });

    shuffle(review);
    shuffle(newCards);

    sessionCards = review.slice(0, REVIEW_LIMIT)
        .concat(newCards.slice(0, NEW_LIMIT));

    shuffle(sessionCards);
    index = 0;
    updateStatus();
}

/* Shows only cards previously marked "Never Show Again" */
function enterUnsuspendMode() {
    mode = "unsuspend";
    sessionCards = allCards.filter(c => srs[c.id]?.suspended);
    index = 0;
    show(0);
}

/* Updates due, new, suspended, topic, and session counts */
function updateStatus() {
    let t = today();
    const statusCards = studyCategory
        ? allCards.filter(c => c.topic === studyCategory)
        : allCards;

    let due = statusCards.filter(c => {
        let d = srs[c.id];
        return d &&
               d.due <= t &&
               !d.suspended &&
               (!d.buried || d.buried < t);
    }).length;

    let newCount = statusCards.filter(c => !srs[c.id]).length;
    let suspended = statusCards.filter(c => srs[c.id]?.suspended).length;

    document.getElementById("status").innerText =
        `Mode: ${mode}${studyCategory ? ` | Topic: ${studyCategory}` : ""} | Due: ${due} | New: ${newCount} | Suspended: ${suspended} | Session: ${sessionCards.length}`;
}

/* Displays one flashcard and resets it to the front side */
function show(i) {
    hideAISentence();

    if (!sessionCards.length) {
        document.getElementById("front").innerText = mode === "unsuspend"
            ? "No suspended cards."
            : "Session complete!";

        document.getElementById("front").style.display = "block";
        document.getElementById("back").style.display = "none";
        document.getElementById("srsButtons").style.display = "none";
        document.getElementById("unsuspendButtons").style.display = "none";
        updateStatus();
        return;
    }

    index = i;
    shown = false;

    let c = sessionCards[index];

    const front = document.getElementById("front");
    const backHanzi = document.getElementById("backHanzi");

    front.innerText = c.hanzi;
    backHanzi.innerText = c.hanzi;

    applyHanziSize(front, c.hanzi);
    applyHanziSize(backHanzi, c.hanzi);

    document.getElementById("backPinyin").innerText = c.pinyin;
    document.getElementById("backEnglish").innerText = c.english;
    document.getElementById("backExample").innerText = c.example;

    front.style.display = "block";
    document.getElementById("back").style.display = "none";
    document.getElementById("srsButtons").style.display = "none";
    document.getElementById("unsuspendButtons").style.display = "none";

    updateStatus();
}

/* Shrinks Hanzi text automatically when a card contains more characters */
function applyHanziSize(element, text) {
    element.classList.remove(
        "hanzi-size-1",
        "hanzi-size-2",
        "hanzi-size-3",
        "hanzi-size-4",
        "hanzi-size-long"
    );

    const length = [...text].length;

    if (length <= 1) {
        element.classList.add("hanzi-size-1");
    } else if (length === 2) {
        element.classList.add("hanzi-size-2");
    } else if (length === 3) {
        element.classList.add("hanzi-size-3");
    } else if (length === 4) {
        element.classList.add("hanzi-size-4");
    } else {
        element.classList.add("hanzi-size-long");
    }
}

/* Reveals the answer side and displays SRS controls */
function flipCard() {
    if (!shown) {
        shown = true;

        document.getElementById("front").style.display = "none";
        document.getElementById("back").style.display = "block";

        const card = sessionCards[index];
        const savedSentence = aiSentences[card.id];

        if (savedSentence) {
            displayAISentence(savedSentence);
        }

        if (mode === "review") {
            document.getElementById("srsButtons").style.display = "block";
        }

        if (mode === "unsuspend") {
            document.getElementById("unsuspendButtons").style.display = "flex";
        }
    }
}

/* =========================================================
   AI SENTENCE GENERATION
   Requests and saves an example sentence for the current word.
   ========================================================= */
async function generateAISentence(forceNew) {
    if (!sessionCards.length) return;

    const card = sessionCards[index];

    if (!forceNew && aiSentences[card.id]) {
        displayAISentence(aiSentences[card.id]);
        return;
    }

    const aiBox = document.getElementById("aiSentenceBox");
    aiBox.style.display = "block";
    document.getElementById("aiChinese").innerText = "Generating sentence...";
    document.getElementById("aiPinyin").innerText = "";
    document.getElementById("aiEnglish").innerText = "";
    document.getElementById("aiNote").innerText = "";

    try {
        const response = await fetch(AI_SENTENCE_API, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                hanzi: card.hanzi,
                pinyin: card.pinyin,
                english: card.english,
                level: "HSK 2 to HSK 4"
            })
        });

        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.error || "Failed to generate sentence.");
        }

        aiSentences[card.id] = data;
        localStorage.setItem("aiSentences", JSON.stringify(aiSentences));

        displayAISentence(data);

    } catch (error) {
        document.getElementById("aiChinese").innerText = "Could not generate sentence.";
        document.getElementById("aiPinyin").innerText = "";
        document.getElementById("aiEnglish").innerText = error.message;
        document.getElementById("aiNote").innerText = "";
    }
}

/* Displays a saved or newly generated AI sentence */
function displayAISentence(sentence) {
    document.getElementById("aiSentenceBox").style.display = "block";
    document.getElementById("aiChinese").innerText = sentence.chinese || "";
    document.getElementById("aiPinyin").innerText = sentence.pinyin || "";
    document.getElementById("aiEnglish").innerText = sentence.english || "";
    document.getElementById("aiNote").innerText = sentence.note || "";
}

/* Clears the AI sentence panel when moving to another card */
function hideAISentence() {
    document.getElementById("aiSentenceBox").style.display = "none";
    document.getElementById("aiChinese").innerText = "";
    document.getElementById("aiPinyin").innerText = "";
    document.getElementById("aiEnglish").innerText = "";
    document.getElementById("aiNote").innerText = "";
}

/* =========================================================
   SRS CARD ACTIONS
   Updates review intervals and card visibility based on the
   selected response.
   ========================================================= */
function rate(r) {
    if (mode !== "review" || !sessionCards.length) return;

    let c = sessionCards[index];
    let d = srs[c.id] || { interval: 1, ease: 2.5 };

    d.suspended = false;
    delete d.buried;

    if (r === "again") {
        d.interval = 1;
        d.ease = Math.max(1.3, d.ease - 0.2);
    }

    if (r === "good") {
        d.interval = Math.max(1, Math.round(d.interval * d.ease));
    }

    if (r === "easy") {
        d.ease += 0.15;
        d.interval = Math.max(2, Math.round(d.interval * d.ease * 1.3));
    }

    let date = new Date();
    date.setDate(date.getDate() + d.interval);
    d.due = date.toISOString().split("T")[0];

    srs[c.id] = d;
    save();
    remove();
}

/* Hides the current card until tomorrow */
function bury() {
    if (!sessionCards.length) return;

    let c = sessionCards[index];
    let d = srs[c.id] || {};

    let t = new Date();
    t.setDate(t.getDate() + 1);
    d.buried = t.toISOString().split("T")[0];

    srs[c.id] = d;
    save();
    remove();
}

/* Removes the current card from normal review sessions */
function suspend() {
    if (!sessionCards.length) return;

    let c = sessionCards[index];
    let d = srs[c.id] || {};

    d.suspended = true;

    srs[c.id] = d;
    save();
    remove();
}

/* Restores a suspended card to normal review */
function unsuspend() {
    if (mode !== "unsuspend" || !sessionCards.length) return;

    let c = sessionCards[index];
    let d = srs[c.id] || {};

    d.suspended = false;

    if (!d.due) {
        d.due = today();
    }

    srs[c.id] = d;
    save();
    remove();
}

/* Removes the answered card from the current session */
function remove() {
    sessionCards.splice(index, 1);

    if (index >= sessionCards.length) {
        index = 0;
    }

    show(index);
    updateStatus();
}

/* Moves forward through the current session */
function nextCard() {
    if (!sessionCards.length) return;
    index = (index + 1) % sessionCards.length;
    show(index);
}

/* Moves backward through the current session */
function prevCard() {
    if (!sessionCards.length) return;
    index = (index - 1 + sessionCards.length) % sessionCards.length;
    show(index);
}

/* Deletes all locally stored SRS progress after confirmation */
function resetSRS() {
    const confirmed = confirm("Reset all SRS progress, including suspended cards?");
    if (!confirmed) return;

    localStorage.removeItem("srs");
    srs = {};
    buildSession();
    show(0);
}

/* Saves SRS data in this browser's localStorage */
function save() {
    localStorage.setItem("srs", JSON.stringify(srs));
}

/* Randomizes the order of cards in a session */
function shuffle(a) {
    for (let i = a.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
}

/* =========================================================
   USER INTERACTION AND EVENT HANDLERS
   Connects buttons, dropdowns, typing, and keyboard shortcuts
   to the functions above.
   ========================================================= */
document.getElementById("searchInput").addEventListener("input", e => {
    const results = search(e.target.value);
    displayResults(results);
});

document.getElementById("flashcardModeBtn").onclick = () => {
    showSection("flashcards");
    buildSession();
    show(0);
};

document.getElementById("dictionaryModeBtn").onclick = () => {
    showSection("dictionary");
};

document.getElementById("browseModeBtn").onclick = () => {
    showSection("browse");
    showCategoryGrid();
};

document.getElementById("categoryFilter").addEventListener("change", () => {
    displayResults(search(document.getElementById("searchInput").value));
});

document.getElementById("flashcardCategoryFilter").addEventListener("change", e => {
    studyCategory = e.target.value;
    buildSession();
    show(0);
});

document.addEventListener("keydown", e => {
    const flashcardVisible = document.getElementById("flashcardSection").style.display !== "none";
    if (!flashcardVisible) return;
    if (document.activeElement.tagName === "INPUT") return;

    if (e.code === "Space") {
        e.preventDefault();
        flipCard();
    }

    if (e.code === "ArrowRight") {
        e.preventDefault();
        nextCard();
    }

    if (e.code === "ArrowLeft") {
        e.preventDefault();
        prevCard();
    }

    if (mode === "review" && shown) {
        if (e.code === "Digit1") rate("again");
        if (e.code === "Digit2") rate("good");
        if (e.code === "Digit3") rate("easy");
        if (e.code === "KeyB") bury();
        if (e.code === "KeyS") suspend();
    }

    if (mode === "unsuspend" && shown) {
        if (e.code === "KeyU") unsuspend();
    }
});

/* Start the application */
load();
</script>
